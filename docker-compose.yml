version: '3.8'

services:
  postgres-sso:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${SSO_DB_NAME}
      POSTGRES_USER: ${SSO_DB_USER}
      POSTGRES_PASSWORD: ${SSO_DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_sso_data:/var/lib/postgresql/data

  postgres-banking:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${BANKING_DB_NAME}
      POSTGRES_USER: ${BANKING_DB_USER}
      POSTGRES_PASSWORD: ${BANKING_DB_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - postgres_banking_data:/var/lib/postgresql/data

  sso:
    build:
      context: .
      dockerfile: apps/sso/Dockerfile
    ports:
      - "3001:3001"
    depends_on:
      - postgres-sso
    environment:
      DATABASE_HOST: postgres-sso
      DATABASE_PORT: 5432
      DATABASE_USERNAME: ${SSO_DB_USER}
      DATABASE_PASSWORD: ${SSO_DB_PASSWORD}
      DATABASE_NAME: ${SSO_DB_NAME}
      JWT_SECRET: ${JWT_SECRET}

  banking:
    build:
      context: .
      dockerfile: apps/banking/Dockerfile
    ports:
      - "3002:3002"
    depends_on:
      - postgres-banking
    environment:
      DATABASE_HOST: postgres-banking
      DATABASE_PORT: 5432
      DATABASE_USERNAME: ${BANKING_DB_USER}
      DATABASE_PASSWORD: ${BANKING_DB_PASSWORD}
      DATABASE_NAME: ${BANKING_DB_NAME}
      WEBHOOK_URL: ${WEBHOOK_URL}

  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - sso
      - banking
    environment:
      SSO_URL: http://sso:3001
      BANKING_URL: http://banking:3002
      JWT_SECRET: ${JWT_SECRET}

volumes:
  postgres_sso_data:
  postgres_banking_data:
