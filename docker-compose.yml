

services:
  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - ./data/kafka:/var/lib/kafka/data

  postgres-sso:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${SSO_DB_NAME}
      POSTGRES_USER: ${SSO_DB_USER}
      POSTGRES_PASSWORD: ${SSO_DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - ./data/postgres-sso:/var/lib/postgresql/data

  postgres-banking:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${BANKING_DB_NAME}
      POSTGRES_USER: ${BANKING_DB_USER}
      POSTGRES_PASSWORD: ${BANKING_DB_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - ./data/postgres-banking:/var/lib/postgresql/data

  sso:
    build:
      context: .
      dockerfile: apps/sso/Dockerfile
    depends_on:
      - postgres-sso
      - kafka
    environment:
      DATABASE_HOST: postgres-sso
      DATABASE_PORT: 5432
      DATABASE_USERNAME: ${SSO_DB_USER}
      DATABASE_PASSWORD: ${SSO_DB_PASSWORD}
      DATABASE_NAME: ${SSO_DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      KAFKA_BROKERS: kafka:9092
      KAFKAJS_NO_PARTITIONER_WARNING: 1

  banking:
    build:
      context: .
      dockerfile: apps/banking/Dockerfile
    depends_on:
      - postgres-banking
      - kafka
    environment:
      DATABASE_HOST: postgres-banking
      DATABASE_PORT: 5432
      DATABASE_USERNAME: ${BANKING_DB_USER}
      DATABASE_PASSWORD: ${BANKING_DB_PASSWORD}
      DATABASE_NAME: ${BANKING_DB_NAME}
      WEBHOOK_URL: ${WEBHOOK_URL}
      KAFKA_BROKERS: kafka:9092
      KAFKAJS_NO_PARTITIONER_WARNING: 1

  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - sso
      - banking
      - kafka
    environment:
      JWT_SECRET: ${JWT_SECRET}
      KAFKA_BROKERS: kafka:9092
      KAFKAJS_NO_PARTITIONER_WARNING: 1
