services:
  kafka:
    image: apache/kafka:latest
    restart: on-failure
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"
    healthcheck:
      test: /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 15s
    volumes:
      - ./data/kafka:/tmp/kafka-logs
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '1.0'

  postgres-sso:
    image: postgres:16-alpine
    restart: on-failure
    environment:
      POSTGRES_DB: ${SSO_DB_NAME}
      POSTGRES_USER: ${SSO_DB_USER}
      POSTGRES_PASSWORD: ${SSO_DB_PASSWORD}
    healthcheck:
      test: pg_isready -U ${SSO_DB_USER} -d ${SSO_DB_NAME}
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./data/postgres-sso:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.3'

  postgres-banking:
    image: postgres:16-alpine
    restart: on-failure
    environment:
      POSTGRES_DB: ${BANKING_DB_NAME}
      POSTGRES_USER: ${BANKING_DB_USER}
      POSTGRES_PASSWORD: ${BANKING_DB_PASSWORD}
    healthcheck:
      test: pg_isready -U ${BANKING_DB_USER} -d ${BANKING_DB_NAME}
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./data/postgres-banking:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.3'

  sso:
    build:
      context: .
      dockerfile: apps/sso/Dockerfile
    restart: on-failure
    depends_on:
      postgres-sso:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DATABASE_HOST: postgres-sso
      DATABASE_PORT: 5432
      DATABASE_USERNAME: ${SSO_DB_USER}
      DATABASE_PASSWORD: ${SSO_DB_PASSWORD}
      DATABASE_NAME: ${SSO_DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      KAFKA_BROKERS: kafka:9092
      KAFKAJS_NO_PARTITIONER_WARNING: 1
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  banking:
    build:
      context: .
      dockerfile: apps/banking/Dockerfile
    restart: on-failure
    depends_on:
      postgres-banking:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DATABASE_HOST: postgres-banking
      DATABASE_PORT: 5432
      DATABASE_USERNAME: ${BANKING_DB_USER}
      DATABASE_PASSWORD: ${BANKING_DB_PASSWORD}
      DATABASE_NAME: ${BANKING_DB_NAME}
      WEBHOOK_URL: ${WEBHOOK_URL}
      KAFKA_BROKERS: kafka:9092
      KAFKAJS_NO_PARTITIONER_WARNING: 1
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    restart: on-failure
    ports:
      - "3000:3000"
    depends_on:
      sso:
        condition: service_started
      banking:
        condition: service_started
      kafka:
        condition: service_healthy
    environment:
      JWT_SECRET: ${JWT_SECRET}
      KAFKA_BROKERS: kafka:9092
      KAFKAJS_NO_PARTITIONER_WARNING: 1
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
